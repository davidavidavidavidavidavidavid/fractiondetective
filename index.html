<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fraction Detective</title>
<style>
:root{
  --red:#D61A21;--red-shadow:#B0141A;--navy:#1B365D;--navy-shadow:#0F213A;
  --lnavy:#2C4A7A;--bg:#F0F2F5;--green:#4CAF50;--green-shadow:#388E3C;
  --amber:#FF9800;--gray:#9E9E9E;--font:"Segoe UI",Roboto,Helvetica,Arial,sans-serif
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:#fff;color:var(--navy);display:flex;justify-content:center;padding:1.5rem;min-height:100vh}
#app{max-width:850px;width:100%;display:flex;flex-direction:column}
#header{text-align:center;padding-bottom:15px;margin-bottom:20px;border-bottom:3px solid var(--bg)}
h1{color:var(--red);font-size:24px;text-transform:uppercase;letter-spacing:3px;font-weight:900}
#main{display:grid;grid-template-columns:320px 1fr;gap:40px;align-items:flex-start}
#left-col{display:flex;flex-direction:column;gap:15px}
.status-card{background:var(--bg);border-radius:20px;padding:15px;text-align:center}
#round-display{font-size:22px;font-weight:900;color:var(--navy);letter-spacing:1px}
#dots-wrap{display:flex;align-items:center;justify-content:center;gap:8px;margin:10px 0 4px}
.dot{width:13px;height:13px;border-radius:50%;background:#d1d5db;transition:all .2s}
.dot.used{background:var(--navy)}.dot.danger{background:var(--red)}
#input-wrap{display:flex;align-items:center;justify-content:center;gap:12px;padding:15px 0;min-height:90px}
.frac{display:inline-flex;flex-direction:column;align-items:center;gap:8px}
.fbar{height:5px;background:var(--navy);width:100%;border-radius:3px;min-width:45px}
.num-group{display:flex;gap:6px}
.eq{font-size:32px;font-weight:900;color:var(--navy);margin:0 4px;align-self:center}
.ibox{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;border:3px solid #cbd5e1;background:#f8fafc;color:var(--navy);cursor:pointer;position:relative;transition:all 0.1s}
.ibox.focused{border-color:var(--red);background:#fff;box-shadow:0 0 0 4px rgba(214,26,33,0.1)}
.ibox.filled{border-color:var(--navy);background:#fff}
.caret{width:3px;height:24px;background:var(--red);animation:blink 1s step-end infinite;border-radius:2px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
#keyboard{display:grid;grid-template-columns:repeat(5,52px);gap:10px;padding:15px;background:var(--bg);border-radius:24px;width:fit-content;align-self:center}
.kb-key{width:52px;height:52px;border-radius:50%;border:none;background:var(--navy);color:#fff;font-size:22px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 0 var(--navy-shadow);position:relative;transition:top 0.1s;top:0;font-family:var(--font)}
.kb-key:active{top:3px;box-shadow:0 1px 0 var(--navy-shadow)}
.kb-key.correct{background:var(--green) !important;box-shadow:0 4px 0 var(--green-shadow) !important}
.kb-key.wrong-pos{background:var(--amber) !important;box-shadow:0 4px 0 #cc7a00 !important}
.kb-key.absent{background:var(--gray) !important;box-shadow:0 4px 0 #777 !important}
.kb-del{grid-column:span 2;height:50px;border-radius:50px;border:none;background:var(--lnavy);color:#fff;font-size:14px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;text-transform:uppercase;box-shadow:0 4px 0 var(--navy-shadow);position:relative;top:0;font-family:var(--font);transition:top .1s}
.kb-enter{grid-column:span 3;height:50px;border-radius:50px;border:none;background:var(--green);color:#fff;font-size:14px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;text-transform:uppercase;box-shadow:0 4px 0 var(--green-shadow);position:relative;top:0;font-family:var(--font);transition:top .1s}
.kb-del:active{top:3px;box-shadow:0 1px 0 var(--navy-shadow)}
.kb-enter:active{top:3px;box-shadow:0 1px 0 var(--green-shadow)}
#msg{text-align:center;font-weight:800;font-size:16px;min-height:24px;margin:5px 0}
#msg.error{color:var(--red)}
#msg.success{color:var(--green)}
#msg.warning{color:var(--amber)}
#right-col{flex:1;background:#fff;border:3px solid var(--bg);border-radius:24px;padding:20px;max-height:520px;overflow-y:auto}
.evidence-label{font-weight:900;text-transform:uppercase;color:#94a3b8;font-size:12px;margin-bottom:15px;text-align:center}
#history{display:flex;flex-direction:column;gap:15px}
.hist-row{display:flex;align-items:center;justify-content:center;gap:15px;border-bottom:2px solid var(--bg);padding-bottom:12px}
.hist-row:last-child{border-bottom:none;padding-bottom:0}
.dbox{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff}
.dbox.correct{background:var(--green)}
.dbox.wrong-pos{background:var(--amber)}
.dbox.absent{background:var(--gray)}
#action-row{display:flex;flex-direction:column;gap:10px;margin-top:10px}
#action-row button{width:100%;padding:14px;border-radius:50px;border:none;background:var(--red);color:#fff;font-weight:900;cursor:pointer;font-size:15px;text-transform:uppercase;letter-spacing:1px;box-shadow:0 4px 0 var(--red-shadow);position:relative;top:0;font-family:var(--font)}
#action-row button:active{top:3px;box-shadow:0 1px 0 var(--red-shadow)}
#hint-btn{background:var(--navy) !important;box-shadow:0 4px 0 var(--navy-shadow) !important;display:none}
#next-btn{display:none}
#hint-text{text-align:center;font-size:13px;margin-top:10px;font-weight:700;color:var(--navy)}
#endurance-info{display:none;text-align:center;font-size:12px;color:#aaa;font-weight:600;margin-top:4px;letter-spacing:.5px}
#endurance-info span{color:var(--navy);font-weight:800}
.shake{animation:shake 0.45s ease}
@keyframes shake{0%,100%{transform:translateX(0)}15%,45%,75%{transform:translateX(-8px)}30%,60%,90%{transform:translateX(8px)}}
#dev-toggle{font-size:11px;opacity:.45;background:none;border:none;cursor:pointer;font-family:var(--font);margin-top:4px;text-align:center}
#dev-panel{background:#f9f9f9;padding:10px;border-radius:8px;font-size:12px;display:none;flex-wrap:wrap;gap:5px;margin-top:6px}
#dev-panel select,#dev-panel button{font-size:12px;padding:3px 8px;border-radius:6px;border:1px solid #ccc;background:#fff;cursor:pointer}
#ans-display{font-size:12px;color:var(--red);font-weight:700}
#gameover{display:none;text-align:center;padding:40px 0}
#gameover h2{font-size:24px;color:var(--navy);margin-bottom:8px;font-weight:900;text-transform:uppercase}
#gameover p{color:#666;margin-bottom:20px;font-size:15px}
#gameover button{padding:14px 32px;border-radius:50px;background:var(--red);color:#fff;border:none;font-weight:900;cursor:pointer;font-size:15px;text-transform:uppercase;box-shadow:0 4px 0 var(--red-shadow)}
</style>
</head>
<body>
<div id="app">
  <div id="header"><h1>Fraction Detective</h1></div>
  <div id="main">
    <div id="left-col">
      <div class="status-card">
        <div id="round-display">ROUND 1</div>
        <div id="dots-wrap">
          <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
          <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
          <div class="dot" id="d4"></div><div class="dot" id="d5"></div>
        </div>
        <div id="endurance-info">guesses left: <span id="s-gleft">50</span></div>
      </div>
      <div id="input-wrap"></div>
      <div id="msg"></div>
      <div id="keyboard">
        <button class="kb-key" data-k="1">1</button>
        <button class="kb-key" data-k="2">2</button>
        <button class="kb-key" data-k="3">3</button>
        <button class="kb-key" data-k="4">4</button>
        <button class="kb-key" data-k="5">5</button>
        <button class="kb-key" data-k="6">6</button>
        <button class="kb-key" data-k="7">7</button>
        <button class="kb-key" data-k="8">8</button>
        <button class="kb-key" data-k="9">9</button>
        <button class="kb-key" data-k="0">0</button>
        <button class="kb-del" data-k="DEL">Delete</button>
        <button class="kb-enter" data-k="ENTER">Submit</button>
      </div>
      <div id="hint-text"></div>
      <div id="action-row">
        <button id="hint-btn">Get a hint</button>
        <button id="next-btn">Next Puzzle</button>
      </div>
      <button id="dev-toggle">Playtest Tools</button>
      <div id="dev-panel">
        <label>Level:</label>
        <select id="level-sel">
          <option value="-1">Auto</option>
          <option value="1">L1</option><option value="2">L2</option>
          <option value="3">L3</option><option value="4">L4</option>
          <option value="5">L5</option><option value="6">L6</option>
        </select>
        <button id="skip-r10">Round 10</button>
        <button id="regen-btn">Regen</button>
        <button id="reveal-btn">Reveal</button>
        <span id="ans-display"></span>
      </div>
    </div>
    <div id="right-col">
      <div class="evidence-label">Evidence Log</div>
      <div id="history"></div>
    </div>
  </div>
  <div id="gameover">
    <h2 id="go-title">Game Over</h2>
    <p id="go-body"></p>
    <button id="go-restart">Play Again</button>
  </div>
</div>

<script>
const gcd = (a, b) => b === 0 ? a : gcd(b, a % b);
function badDenom(d) { return d > 11 && d % 11 === 0; }

const LEVELS = {
  1: { maxBase: 8,  maxAns: 9,  improper: false, mustSimplified: true,  factorsOnly: true,  force2digit: false },
  2: { maxBase: 12, maxAns: 24, improper: false, mustSimplified: true,  factorsOnly: true,  force2digit: false },
  3: { maxBase: 14, maxAns: 48, improper: false, mustSimplified: false, factorsOnly: true,  force2digit: true  },
  4: { maxBase: 16, maxAns: 60, improper: true,  mustSimplified: false, factorsOnly: true,  force2digit: true  },
  5: { maxBase: 16, maxAns: 72, improper: true,  mustSimplified: false, factorsOnly: false, force2digit: true  },
  6: { maxBase: 20, maxAns: 99, improper: true,  mustSimplified: false, factorsOnly: false, force2digit: true  },
};

// Difficulty level scales every 6 puzzles in the background
function getLevelForPuzzle(puzzleNum) {
  if (puzzleNum <= 6)  return 1;
  if (puzzleNum <= 14) return 2;
  if (puzzleNum <= 24) return 3;
  if (puzzleNum <= 34) return 4;
  if (puzzleNum <= 46) return 5;
  return 6;
}

function generatePuzzle(lvNum) {
  const lv = LEVELS[lvNum];
  for (let att = 0; att < 3000; att++) {
    const maxN = lv.improper ? lv.maxBase : lv.maxBase - 1;
    let bN = 1 + Math.floor(Math.random() * maxN);
    let bD = lv.improper
      ? (1 + Math.floor(Math.random() * lv.maxBase))
      : (bN + 1 + Math.floor(Math.random() * (lv.maxBase - bN)));
    if (bD < 1 || bN < 1) continue;
    const g = gcd(bN, bD); bN = bN / g; bD = bD / g;
    if (bN === bD) continue;
    let k1, k2;
    const maxK = Math.floor(lv.maxAns / Math.max(bN, bD));
    if (maxK < 2) continue;
    if (lv.mustSimplified) {
      k1 = 1; k2 = 2 + Math.floor(Math.random() * (maxK - 1));
      if (k2 > maxK) continue;
    } else if (lv.factorsOnly) {
      k2 = 2 + Math.floor(Math.random() * (maxK - 1));
      if (k2 > maxK) continue;
      const divs = []; for (let d = 1; d < k2; d++) if (k2 % d === 0) divs.push(d);
      if (!divs.length) continue;
      k1 = divs[Math.floor(Math.random() * divs.length)];
    } else {
      k1 = 1 + Math.floor(Math.random() * (maxK - 1));
      k2 = k1 + 1 + Math.floor(Math.random() * (maxK - k1));
      if (k2 > maxK) continue;
    }
    if (k1 < 1 || k2 <= k1) continue;
    const ans = { n1: bN*k1, d1: bD*k1, n2: bN*k2, d2: bD*k2 };
    if ([ans.n1, ans.d1, ans.n2, ans.d2].some(v => v > 99 || v < 1)) continue;
    if (lvNum === 1 && [ans.n1, ans.d1, ans.n2, ans.d2].some(v => v > 9)) continue;
    if (badDenom(ans.d1) || badDenom(ans.d2)) continue;
    if (lv.force2digit && ![ans.n1, ans.d1, ans.n2, ans.d2].some(v => v >= 10)) continue;
    return { ans, bN, bD, k1, k2, lvNum };
  }
  return { ans: { n1:1, d1:3, n2:2, d2:6 }, bN:1, bD:3, k1:1, k2:2, lvNum };
}

let slots = [], partDigits = [], focusSlot = 0;

function buildSlots(ans) {
  partDigits = [String(ans.n1).length, String(ans.d1).length, String(ans.n2).length, String(ans.d2).length];
  slots = [];
  for (let p = 0; p < 4; p++) for (let d = 0; d < partDigits[p]; d++) slots.push({ partIdx: p, digitIdx: d, value: '' });
  focusSlot = 0;
}
function getPartValue(p) {
  const my = slots.filter(s => s.partIdx === p);
  if (my.some(s => s.value === '')) return null;
  return parseInt(my.map(s => s.value).join(''), 10);
}
function answerToDigits(ans) { return [ans.n1, ans.d1, ans.n2, ans.d2].flatMap(v => String(v).split('')); }
function colorDigits(gd, td) {
  const n = td.length, colors = new Array(n).fill(''), tL = [...td], gL = [...gd];
  for (let i = 0; i < n; i++) if (gL[i] === tL[i]) { colors[i] = 'correct'; tL[i] = null; gL[i] = null; }
  for (let i = 0; i < n; i++) {
    if (gL[i] === null) continue;
    const ti = tL.indexOf(gL[i]);
    if (ti !== -1) { colors[i] = 'wrong-pos'; tL[ti] = null; } else colors[i] = 'absent';
  }
  return colors;
}

function renderInputSlots() {
  const wrap = document.getElementById('input-wrap');
  wrap.innerHTML = '';
  if (st.gameOver) return;
  const makeNumGroup = (p) => {
    const g = document.createElement('div'); g.className = 'num-group';
    slots.forEach((s, gi) => {
      if (s.partIdx !== p) return;
      const box = document.createElement('div');
      box.className = 'ibox' + (gi === focusSlot ? ' focused' : '') + (s.value !== '' ? ' filled' : '');
      if (s.value !== '') { box.textContent = s.value; }
      else if (gi === focusSlot) { const car = document.createElement('div'); car.className = 'caret'; box.appendChild(car); }
      box.addEventListener('click', () => { focusSlot = gi; renderInputSlots(); });
      g.appendChild(box);
    });
    return g;
  };
  const makeFrac = (nP, dP) => {
    const f = document.createElement('div'); f.className = 'frac';
    f.appendChild(makeNumGroup(nP));
    const bar = document.createElement('div'); bar.className = 'fbar'; f.appendChild(bar);
    f.appendChild(makeNumGroup(dP)); return f;
  };
  wrap.appendChild(makeFrac(0, 1));
  const eq = document.createElement('div'); eq.className = 'eq'; eq.textContent = '='; wrap.appendChild(eq);
  wrap.appendChild(makeFrac(2, 3));
}

function slotInput(digit) {
  if (focusSlot >= slots.length) return;
  const s = slots[focusSlot];
  if (s.digitIdx === 0 && s.value === '' && digit === '0' && partDigits[s.partIdx] > 1) {
    setMsg('No leading zeros!', 'error'); setTimeout(() => setMsg(''), 900); return;
  }
  s.value = digit;
  let next = focusSlot + 1;
  while (next < slots.length && slots[next].value !== '') next++;
  focusSlot = next < slots.length ? next : slots.length - 1;
  renderInputSlots();
}
function slotDel() {
  if (slots[focusSlot] && slots[focusSlot].value !== '') slots[focusSlot].value = '';
  else if (focusSlot > 0) { focusSlot--; slots[focusSlot].value = ''; }
  renderInputSlots();
}
function clearSlots() { slots.forEach(s => s.value = ''); focusSlot = 0; renderInputSlots(); }

function updateKbColors() {
  const rank = { correct: 3, 'wrong-pos': 2, absent: 1 };
  const { ans } = st.puzzle;
  const targetDigits = new Set(answerToDigits(ans));
  const digitBest = {};
  st.history.forEach(row => {
    if (row.invalid) return;
    row.slotColors.forEach((c, i) => {
      const d = row.digits[i];
      if (c === 'absent' && targetDigits.has(d)) return;
      if (!digitBest[d] || (rank[c] || 0) > (rank[digitBest[d]] || 0)) digitBest[d] = c;
    });
  });
  document.querySelectorAll('.kb-key[data-k]').forEach(btn => {
    const k = btn.dataset.k;
    btn.className = 'kb-key';
    if (digitBest[k]) btn.classList.add(digitBest[k]);
  });
}

function renderHistory() {
  const hist = document.getElementById('history'); hist.innerHTML = '';
  st.history.forEach(row => {
    if (row.invalid) return;
    const div = document.createElement('div'); div.className = 'hist-row';
    const makeFracH = (nVal, dVal, nColors, dColors) => {
      const frac = document.createElement('div'); frac.className = 'frac';
      const makeGroup = (val, colors) => {
        const g = document.createElement('div'); g.className = 'num-group';
        String(val).split('').forEach((ch, i) => {
          const b = document.createElement('div'); b.className = 'dbox ' + (colors[i] || 'absent');
          b.textContent = ch; g.appendChild(b);
        }); return g;
      };
      frac.appendChild(makeGroup(nVal, nColors));
      const bar = document.createElement('div'); bar.className = 'fbar'; frac.appendChild(bar);
      frac.appendChild(makeGroup(dVal, dColors)); return frac;
    };
    let si = 0;
    const pc = partDigits.map(nd => { const c = row.slotColors.slice(si, si + nd); si += nd; return c; });
    div.appendChild(makeFracH(row.n1, row.d1, pc[0], pc[1]));
    const eq = document.createElement('div'); eq.className = 'eq'; eq.textContent = '='; div.appendChild(eq);
    div.appendChild(makeFracH(row.n2, row.d2, pc[2], pc[3]));
    hist.appendChild(div);
  });
  const rc = document.getElementById('right-col'); rc.scrollTop = rc.scrollHeight;
}

function renderDots() {
  for (let i = 0; i < 6; i++) {
    const d = document.getElementById('d' + i); d.className = 'dot';
    if (i < st.guesses) d.classList.add(i === 5 ? 'danger' : 'used');
  }
}
function renderEndurance() {
  if (!st.endurance) return;
  document.getElementById('endurance-info').style.display = 'block';
  document.getElementById('s-gleft').textContent = st.guessesLeft;
}
function setMsg(txt, type = '') { const el = document.getElementById('msg'); el.textContent = txt; el.className = type; }
function shakeInput() {
  const w = document.getElementById('input-wrap');
  w.classList.remove('shake'); void w.offsetWidth; w.classList.add('shake');
  w.addEventListener('animationend', () => w.classList.remove('shake'), { once: true });
}

let st = { round: 1, puzzle: null, history: [], guesses: 0, solved: 0, gameOver: false, devLevel: -1, hintUsed: false, endurance: false, guessesLeft: 50, guessLog: [] };
function currentLevel() { return st.devLevel > 0 ? st.devLevel : getLevelForPuzzle(st.round); }

function showGameOver(title, body) {
  document.getElementById('input-wrap').innerHTML = '';
  document.getElementById('main').style.display = 'none';
  document.getElementById('msg').textContent = '';
  document.getElementById('gameover').style.display = 'block';
  document.getElementById('go-title').textContent = title;
  document.getElementById('go-body').textContent = body;
}
function fullReset() {
  st = { round: 1, puzzle: null, history: [], guesses: 0, solved: 0, gameOver: false, devLevel: st.devLevel, hintUsed: false, endurance: false, guessesLeft: 50, guessLog: [] };
  document.getElementById('gameover').style.display = 'none';
  document.getElementById('main').style.display = 'grid';
  document.getElementById('endurance-info').style.display = 'none';
  init();
}
function init() {
  st.puzzle = generatePuzzle(currentLevel());
  st.history = []; st.guesses = 0; st.gameOver = false; st.hintUsed = false;
  buildSlots(st.puzzle.ans);
  renderInputSlots(); renderHistory(); renderDots();
  setMsg('');
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('hint-btn').style.display = 'none';
  document.getElementById('hint-text').textContent = '';
  document.getElementById('ans-display').textContent = '';
  document.getElementById('round-display').textContent = 'ROUND ' + st.round;
  if (st.endurance) renderEndurance();
  updateKbColors();
}

function advanceRound() {
  // Every puzzle completion = round +1
  st.round++;
  // Endurance kicks in after round 20
  if (!st.endurance && st.round > 20) { st.endurance = true; st.guessesLeft = 50; st.guessLog = []; }
  init();
}

function submit() {
  if (st.gameOver) return;
  const ns = [0, 1, 2, 3].map(getPartValue);
  if (ns.some(v => v === null || v < 1)) { shakeInput(); return; }
  const [n1, d1, n2, d2] = ns;
  // Duplicate — shake and clear silently
  if (st.history.some(r => !r.invalid && ((r.n1===n1&&r.d1===d1&&r.n2===n2&&r.d2===d2)||(r.n1===n2&&r.d1===d2&&r.n2===n1&&r.d2===d1)))) {
    shakeInput(); setTimeout(() => clearSlots(), 600); return;
  }
  // Invalid equation — shake and clear silently
  if (n1 * d2 !== n2 * d1) {
    shakeInput(); setTimeout(() => clearSlots(), 600); return;
  }
  const { ans } = st.puzzle;
  const exactWin = (n1===ans.n1 && d1===ans.d1 && n2===ans.n2 && d2===ans.d2);
  const flippedWin = (n1===ans.n2 && d1===ans.d2 && n2===ans.n1 && d2===ans.d1);
  const won = exactWin || flippedWin;
  const targetDigits = answerToDigits(ans);
  const guessDigits = [n1, d1, n2, d2].flatMap(v => String(v).split(''));
  const slotColors = won ? targetDigits.map(() => 'correct') : colorDigits(guessDigits, targetDigits);
  if (st.endurance) { st.guessesLeft--; st.guessLog.push('used'); }
  st.history.push({ n1, d1, n2, d2, slotColors, digits: guessDigits });
  st.guesses++;
  renderHistory(); renderDots(); updateKbColors(); clearSlots();
  if (won) {
    if (st.endurance) st.guessLog[st.guessLog.length - 1] = 'won';
    st.solved++;
    setMsg(`Case closed in ${st.guesses} ${st.guesses === 1 ? 'guess' : 'guesses'}!`, 'success');
    st.gameOver = true;
    document.getElementById('input-wrap').innerHTML = '';
    if (st.endurance) { renderEndurance(); if (st.guessesLeft <= 0) { setTimeout(() => showGameOver('Out of guesses!', `You solved ${st.solved} puzzles. Impressive endurance!`), 800); return; } }
    document.getElementById('next-btn').style.display = 'block';
  } else if (st.guesses >= 6) {
    if (st.endurance) st.guessLog[st.guessLog.length - 1] = 'lost';
    setMsg(`Answer: ${ans.n1}/${ans.d1} = ${ans.n2}/${ans.d2}`, 'error');
    st.gameOver = true;
    document.getElementById('input-wrap').innerHTML = '';
    if (st.endurance) { renderEndurance(); if (st.guessesLeft <= 0) { setTimeout(() => showGameOver('Out of guesses!', `You solved ${st.solved} puzzles before running out of guesses.`), 1200); return; } }
    document.getElementById('next-btn').style.display = 'block';
  }
  // No message for valid-but-wrong guesses
}

function handleKey(k) {
  if (k === 'ENTER') { if (st.gameOver) { advanceRound(); return; } submit(); return; }
  if (st.gameOver) return;
  if (k === 'DEL') { slotDel(); return; }
  if (!/^\d$/.test(k)) return;
  slotInput(k);
}

document.getElementById('keyboard').addEventListener('click', e => {
  const btn = e.target.closest('[data-k]'); if (btn) handleKey(btn.dataset.k);
});
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'SELECT') return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key === 'Backspace') { e.preventDefault(); handleKey('DEL'); }
  else if (e.key === 'Enter') { e.preventDefault(); handleKey('ENTER'); }
  else if (e.key === 'ArrowRight' || e.key === 'Tab') { e.preventDefault(); if (!st.gameOver) { focusSlot = Math.min(slots.length - 1, focusSlot + 1); renderInputSlots(); } }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); if (!st.gameOver) { focusSlot = Math.max(0, focusSlot - 1); renderInputSlots(); } }
  else if (/^\d$/.test(e.key)) { e.preventDefault(); handleKey(e.key); }
});

document.getElementById('next-btn').addEventListener('click', () => advanceRound());
document.getElementById('hint-btn').addEventListener('click', () => {
  st.hintUsed = true; document.getElementById('hint-btn').style.display = 'none';
  document.getElementById('hint-text').textContent = `Hint: simplified form is ${st.puzzle.bN}/${st.puzzle.bD}`;
});
document.getElementById('dev-toggle').addEventListener('click', () => {
  const p = document.getElementById('dev-panel'); p.style.display = p.style.display === 'flex' ? 'none' : 'flex';
});
document.getElementById('level-sel').addEventListener('change', e => { st.devLevel = parseInt(e.target.value); });
document.getElementById('regen-btn').addEventListener('click', () => init());
document.getElementById('reveal-btn').addEventListener('click', () => {
  const a = st.puzzle.ans; document.getElementById('ans-display').textContent = `${a.n1}/${a.d1} = ${a.n2}/${a.d2}`;
});
document.getElementById('skip-r10').addEventListener('click', () => {
  st.round = 10; st.devLevel = -1; document.getElementById('level-sel').value = '-1';
  init(); setMsg('Skipped to round 10', 'warning');
});
document.getElementById('go-restart').addEventListener('click', () => fullReset());

init();
</script>
